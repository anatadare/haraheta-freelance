<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Haraheta Freelance</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section id="contentArea" class="content"></section>
  </main>

  <nav class="tabbar" aria-label="Bottom Navigation">
    <button class="tab" data-tab="job" aria-label="Job">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 7h16v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7Z" stroke="currentColor" stroke-width="1.8"/>
          <path d="M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" stroke="currentColor" stroke-width="1.8"/>
        </svg>
      </span>
      <span class="label">Job</span>
    </button>

    <button class="tab" data-tab="submit" aria-label="Submit">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 3v12" stroke="currentColor" stroke-width="1.8"/>
          <path d="m7 8 5-5 5 5" stroke="currentColor" stroke-width="1.8"/>
          <rect x="4" y="15" width="16" height="6" rx="2" stroke="currentColor" stroke-width="1.8"/>
        </svg>
      </span>
      <span class="label">Submit</span>
    </button>

    <button class="tab tab-center active" data-tab="deploy" aria-label="Deploy" aria-current="page">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 3 4 7v10l8 4 8-4V7l-8-4Z" stroke="currentColor" stroke-width="1.8"/>
          <path d="m4 7 8 4 8-4M12 11v10" stroke="currentColor" stroke-width="1.8"/>
        </svg>
      </span>
      <span class="label">Deploy</span>
    </button>

    <button class="tab" data-tab="wallet" aria-label="Wallet">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="3" y="6" width="18" height="12" rx="2" stroke="currentColor" stroke-width="1.8"/>
          <path d="M16 12h4" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="16" cy="12" r="1" fill="currentColor"/>
        </svg>
      </span>
      <span class="label">Wallet</span>
    </button>

    <button class="tab" data-tab="profile" aria-label="Profile">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="8" r="3.2" stroke="currentColor" stroke-width="1.8"/>
          <path d="M5 19a7 7 0 0 1 14 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="label">Profile</span>
    </button>
  </nav>

  <!-- optional external deploy tab logic -->
  <script src="js/tabs/deploy.js"></script>
  <!-- main app logic -->
  <script src="script.js"></script>
</body>
</html>
