<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freelance Bot Mini App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="content">
      <h1 id="pageTitle">Deploy</h1>
      <p id="pageDesc">Halaman Deploy aktif.</p>
    </section>
  </main>

  <nav class="tabbar" aria-label="Bottom Navigation">
    <button class="tab" data-tab="job" aria-label="Job">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="7" height="7" rx="1.2"></rect>
          <rect x="14" y="3" width="7" height="7" rx="1.2"></rect>
          <rect x="3" y="14" width="7" height="7" rx="1.2"></rect>
          <rect x="14" y="14" width="7" height="7" rx="1.2"></rect>
        </svg>
      </span>
      <span class="label">Job</span>
    </button>

    <button class="tab" data-tab="submit" aria-label="Submit">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 3L10 14"></path>
          <path d="M21 3l-7 18-4-7-7-4 18-7z"></path>
        </svg>
      </span>
      <span class="label">Submit</span>
    </button>

    <button class="tab tab-center active" data-tab="deploy" aria-label="Deploy" aria-current="page">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9.2"></circle>
          <path d="M12 5.2c1.8 1.8 2.8 4.2 2.8 6.7v2.1l1.7 1.6-1 2.5-3.5-1.9-3.5 1.9-1-2.5 1.7-1.6v-2.1c0-2.5 1-4.9 2.8-6.7z" fill="currentColor" stroke="none"></path>
          <circle cx="12" cy="9.9" r="1.3" fill="#0b0b0c" stroke="none"></circle>
        </svg>
      </span>
      <span class="label">Deploy</span>
    </button>

    <button class="tab" data-tab="wallet" aria-label="Wallet">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H20v14H5.5A2.5 2.5 0 0 1 3 16.5z"></path>
          <path d="M20 9h-5a2 2 0 0 0 0 4h5z"></path>
          <circle cx="15" cy="11" r="0.8" fill="currentColor" stroke="none"></circle>
        </svg>
      </span>
      <span class="label">Wallet</span>
    </button>

    <button class="tab" data-tab="profile" aria-label="Profile">
      <span class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="3.2"></circle>
          <path d="M5 19c1.8-3 4.2-4.5 7-4.5s5.2 1.5 7 4.5"></path>
        </svg>
      </span>
      <span class="label">Profile</span>
    </button>
  </nav>

  <script src="script.js"></script>
</body>
</html>
